<!DOCTYPE html>
<html>
<head>
<title>Anonymous Message</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}

textarea{
width:80%;
height:200px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Send Anonymous Message</h1>

<textarea id="msg" placeholder="Type your message"></textarea>

<br>

<button onclick="send()">Send</button>

<script>

function send(){

let message=document.getElementById("msg").value

if(message.length==0){
alert("Write something first")
return
}

let url="https://github.com/itz-ydv-golu-06/post-uknownomus/issues/new?title=Anonymous%20Message&body="+encodeURIComponent(message)

window.open(url,"_blank")

}

</script>

</body>
</html>
