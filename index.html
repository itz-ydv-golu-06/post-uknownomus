<!DOCTYPE html>
<html>
<head>
<title>Message Box</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}

textarea{
width:80%;
height:200px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}
</style>

</head>

<body>

<h1>Send a Message</h1>

<textarea id="message" maxlength="100000"></textarea>

<br>

<button onclick="sendMessage()">Send</button>

<p id="status"></p>

<script>

async function sendMessage(){

let message=document.getElementById("message").value

if(message.length==0){
alert("Write something first")
return
}

document.getElementById("status").innerText="Sending..."

const response=await fetch("https://api.github.com/repos/itz-ydv-golu-06/post-uknownomus/issues",{
method:"POST",
headers:{
"Authorization":"token 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",
"Accept":"application/vnd.github+json",
"Content-Type":"application/json"
},
body:JSON.stringify({
title:"New Message",
body:message
})
})

if(response.ok){
document.getElementById("status").innerText="Message sent!"
document.getElementById("message").value=""
}else{
document.getElementById("status").innerText="Error sending message"
}

}

</script>

</body>
</html>
